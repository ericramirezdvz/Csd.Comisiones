<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: Arial, sans-serif;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f6f8; padding: 20px"
    >
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            "
          >
            <!-- Header -->
            <tr>
              <td
                style="
                  background: #dc3545;
                  color: white;
                  padding: 20px;
                  text-align: center;
                "
              >
                <h2 style="margin: 0">Rechazar Servicios</h2>
              </td>
            </tr>

            <!-- Body -->
            <tr>
              <td style="padding: 30px; color: #333">
                <p>
                  <strong>{{Proveedor}}</strong>, está a punto de rechazar los
                  servicios de la solicitud:
                </p>

                <table
                  width="100%"
                  cellpadding="8"
                  cellspacing="0"
                  style="margin: 15px 0; border-collapse: collapse"
                >
                  <tr style="border-bottom: 1px solid #eee">
                    <td style="font-weight: bold; width: 120px; color: #555">
                      Folio:
                    </td>
                    <td>{{Folio}}</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #eee">
                    <td style="font-weight: bold; color: #555">Obra:</td>
                    <td>{{Obra}}</td>
                  </tr>
                  <tr style="border-bottom: 1px solid #eee">
                    <td style="font-weight: bold; color: #555">
                      Fecha inicio:
                    </td>
                    <td>{{FechaInicio}}</td>
                  </tr>
                  <tr>
                    <td style="font-weight: bold; color: #555">Fecha fin:</td>
                    <td>{{FechaFin}}</td>
                  </tr>
                </table>

                <form method="POST" action="{{UrlRechazoPost}}">
                  <label
                    for="comentarios"
                    style="
                      display: block;
                      font-weight: bold;
                      margin-bottom: 8px;
                      color: #333;
                    "
                  >
                    Motivo del rechazo: <span style="color: #dc3545">*</span>
                  </label>
                  <textarea
                    id="comentarios"
                    name="comentarios"
                    rows="4"
                    required
                    placeholder="Indique el motivo por el cual rechaza estos servicios..."
                    style="
                      width: 100%;
                      padding: 10px;
                      border: 1px solid #ccc;
                      border-radius: 4px;
                      font-family: Arial, sans-serif;
                      font-size: 14px;
                      resize: vertical;
                      box-sizing: border-box;
                    "
                  ></textarea>

                  <table width="100%" style="margin-top: 20px">
                    <tr>
                      <td align="right">
                        <button
                          type="submit"
                          style="
                            background-color: #dc3545;
                            color: white;
                            padding: 12px 30px;
                            border: none;
                            border-radius: 5px;
                            font-size: 14px;
                            cursor: pointer;
                            font-weight: bold;
                          "
                        >
                          Confirmar rechazo
                        </button>
                      </td>
                    </tr>
                  </table>
                </form>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
