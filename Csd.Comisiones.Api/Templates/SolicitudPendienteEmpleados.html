<!DOCTYPE html>
<html>
<body style="font-family: Arial;">

    <h2>Solicitud pendiente de autorización</h2>

    <p>Hola,</p>

    <p>
        Tienes una solicitud pendiente de autorización.
    </p>

    <p>
        <strong>Folio:</strong> {{Folio}} <br />
        <strong>Obra:</strong> {{Obra}} <br />
        <strong>Fecha inicio:</strong> {{FechaInicio}} <br />
        <strong>Fecha fin:</strong> {{FechaFin}}
    </p>

    <h3>Empleados</h3>

    <table border="1" cellpadding="8" cellspacing="0" style="border-collapse: collapse;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th>Nombre</th>
                <th>Fecha Inicio</th>
                <th>Fecha Fin</th>
            </tr>
        </thead>
        <tbody>
            {{EmpleadosRows}}
        </tbody>
    </table>

    <br />

    <p>Selecciona una acción:</p>

    <a href="{{UrlAprobar}}"
       style="background-color: #28a745; color: white; padding: 10px 20px;
              text-decoration: none; border-radius: 5px; margin-right: 10px;">
        Aprobar
    </a>

    <a href="{{UrlRechazar}}"
       style="background-color: #dc3545; color: white; padding: 10px 20px;
              text-decoration: none; border-radius: 5px;">
        Rechazar
    </a>

    <br /><br />

    <p>Saludos.</p>

</body>
</html>
